<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MoneyWise</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">💰 MoneyWise</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
                <li><a href="reports.html">Reports</a></li>
                
            </ul>
            <button class="theme-toggle" id="themeToggle">🌙 Dark Mode</button>
        </div>
    </nav>

    
    <section class="welcome-banner">
        <div class="container">
            <div class="welcome-content">
                <h1>Welcome back! 👋</h1>
                <p class="current-date" id="currentDate"></p>
            </div>
            <div class="motivational-quote">
                <p id="dailyQuote">"Track today. Secure tomorrow."</p>
            </div>
        </div>
    </section>

    
    <main class="container">
        
        <section class="summary-section">
            <div class="summary-card income-card">
                <div class="card-icon">📈</div>
                <h3>Total Income</h3>
                <p class="amount" id="totalIncome">₹0.00</p>
            </div>
            <div class="summary-card expense-card">
                <div class="card-icon">📉</div>
                <h3>Total Expense</h3>
                <p class="amount" id="totalExpense">₹0.00</p>
            </div>
            <div class="summary-card balance-card">
                <div class="card-icon">💰</div>
                <h3>Current Balance</h3>
                <p class="amount" id="currentBalance">₹0.00</p>
            </div>
        </section>

        
        <section class="form-section">
            <h2>📝 Add New Transaction</h2>
            <form id="transactionForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" placeholder="Enter amount" required min="0.01" step="0.01">
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Enter description" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Transaction Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="type" value="income" required>
                                <span class="income-badge"> Income</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="type" value="expense" checked>
                                <span class="expense-badge"> Expense</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Travel">✈️ Travel</option>
                            <option value="Rent">🏠 Rent</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Education">📚 Education</option>
                            <option value="Medical">⚕️ Medical</option>
                            <option value="Salary">💼 Salary</option>
                            <option value="Others">📦 Others</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-add">➕ Add Transaction</button>
            </form>
        </section>

       
        <section class="history-section">
            <h2>📋 Transaction History</h2>
            <div id="transactionList" class="transaction-list">
                <p class="no-transactions">No transactions yet. Add your first one!</p>
            </div>
        </section>
    </main>

    
    <footer>
        <p>💻 MoneyWise Expense Tracker </p>
        
    </footer>

    <script src="dashboard.js"></script>
</body>
</html>
